<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Bite — Taste Worth Living For</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #0b0c10;
      --card: #12141b;
      --card2: #161a24;
      --text: #eef2ff;
      --muted: rgba(238, 242, 255, 0.72);
      --line: rgba(238, 242, 255, 0.12);
      --brand: #ff4d4d;   
      --brand2: #ffb84d;  
      --ok: #3ddc97;      
      --radius: 18px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 20%, rgba(255, 77, 77, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(255, 184, 77, 0.04) 0%, transparent 40%),
                  var(--bg);
      background-attachment: fixed;
      padding-bottom: 60px;
    }

    /* Navbar / Header */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(11, 12, 16, 0.8);
      border-bottom: 1px solid var(--line);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; }
    .logo span { color: var(--brand); }

    .live-counter {
      background: rgba(61, 220, 151, 0.1);
      border: 1px solid rgba(61, 220, 151, 0.2);
      color: var(--ok);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .live-dot {
      width: 8px; height: 8px; background: var(--ok); border-radius: 50%;
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.6; }
    }

    .hero-banner {
      max-width: 1100px;
      margin: 20px auto;
      padding: 40px 20px;
      text-align: center;
      background: linear-gradient(135deg, rgba(255, 77, 77, 0.15) 0%, rgba(255, 184, 77, 0.05) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .hero-banner h1 { margin: 0 0 10px 0; font-size: 36px; }
    .hero-banner p { margin: 0; color: var(--muted); font-size: 16px; }

    /* Main Menu Layout Container */
    .menu-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .category-section {
      margin-top: 40px;
      margin-bottom: 20px;
    }
    .category-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--brand2);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* Product Cards */
    .product-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s pathways, border-color 0.3s, opacity 0.3s;
    }
    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 184, 77, 0.3);
    }
    .product-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: var(--card2);
    }
    .product-info {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .product-name { font-size: 18px; font-weight: 700; margin: 0 0 8px 0; }
    .product-desc { font-size: 13px; color: var(--muted); margin: 0 0 16px 0; line-height: 1.4; flex-grow: 1; }
    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .product-price { font-size: 18px; font-weight: 700; color: var(--ok); }
    
    .btn-order {
      background: var(--brand);
      color: #fff;
      border: none;
      padding: 8px 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-order:hover { opacity: 0.9; }

    /* Found Highlight Pulse Filter style */
    .search-highlight {
      animation: highlightPulse 2s ease-in-out;
      border: 2px solid var(--brand) !important;
    }
    @keyframes highlightPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.6); }
      50% { transform: scale(1.02); box-shadow: 0 0 15px 5px rgba(255, 77, 77, 0.4); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
    }

    .status-msg { text-align: center; padding: 60px; color: var(--muted); font-size: 16px; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">ONE<span>BITE</span></a>
    <div class="live-counter">
      <div class="live-dot"></div>
      <span>1 watching</span>
    </div>
  </nav>

  <div class="hero-banner">
    <h1>Taste Worth Living For</h1>
    <p>Hot, fresh items delivered straight to your doorstep.</p>
  </div>

  <div style="max-width: 600px; margin: 25px auto; padding: 0 20px;">
    <div style="position: relative; display: flex; align-items: center;">
      <span style="position: absolute; left: 16px; color: rgba(238, 242, 255, 0.4); font-size: 18px;">🔍</span>
      <input 
        type="text" 
        id="menuSearchInput" 
        placeholder="Search burger, pizza, bbq tikka..." 
        style="width: 100%; padding: 14px 14px 14px 48px; background: var(--card); border: 1px solid var(--line); border-radius: 30px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s;"
        oninput="handleMenuSearch()"
      >
      <button 
        id="clearSearchBtn" 
        onclick="clearMenuSearch()" 
        style="position: absolute; right: 16px; background: transparent; border: none; color: rgba(238, 242, 255, 0.4); font-size: 16px; cursor: pointer; display: none;"
      >✕</button>
    </div>
  </div>

  <div class="menu-container" id="menuContainer">
    <div class="status-msg">Loading delicious menu options...</div>
  </div>

  <script>
    // Initialize standard Supabase connection configurations
    const SUPABASE_URL = "https://vzdpoezelgjjtklcpdad.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XxxlAsDIO7-EJb95VeXxNw_Baa2QWq6"; 
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let categoriesData = [];
    let itemsData = [];

    window.onload = function() {
      fetchShopData();
    };

    // Load Categories and Products out of Database Stack
    async function fetchShopData() {
      try {
        const { data: cats, error: catErr } = await sb.from("categories").select("*");
        if (catErr) throw catErr;
        categoriesData = cats || [];

        const { data: items, error: itemErr } = await sb.from("items").select("*");
        if (itemErr) throw itemErr;
        itemsData = items || [];

        renderMenuBoard();
      } catch (err) {
        document.getElementById("menuContainer").innerHTML = `<div class="status-msg" style="color:var(--brand)">Error loading menu: ${err.message}</div>`;
      }
    }

    // Beautiful nested rendering matching items securely to parent Category blocks
    function renderMenuBoard() {
      const container = document.getElementById("menuContainer");
      if (categoriesData.length === 0) {
        container.innerHTML = '<div class="status-msg">No active items found in menu database loop.</div>';
        return;
      }

      container.innerHTML = "";

      categoriesData.forEach(cat => {
        // Filter elements corresponding down cleanly into targeted array mappings
        const subItems = itemsData.filter(item => item.category_id === cat.id || item.category_id == cat.name);
        
        if (subItems.length === 0) return; // Skip categories with no current products

        // The custom 'data-category-name' tag allows the search engine to track text matches to scroll down
        const section = document.createElement("div");
        section.className = "category-section";
        section.setAttribute("data-category-name", cat.name.toLowerCase());
        
        let sectionHtml = `
          <div class="category-title">
            <span>${cat.icon || '🍔'}</span>
            <span>${cat.name}</span>
          </div>
          <div class="products-grid">
        `;

        subItems.forEach(item => {
          sectionHtml += `
            <div class="product-card">
              ${item.image ? `<img src="${item.image}" class="product-img" alt="${item.name}">` : `<div class="product-img" style="display:flex; align-items:center; justify-content:center; color:var(--muted)">📸 No Image</div>`}
              <div class="product-info">
                <h3 class="product-name">${item.name}</h3>
                <p class="product-desc">${item.description || 'No ingredients information provided.'}</p>
                <div class="product-footer">
                  <span class="product-price">Rs ${Number(item.price).toLocaleString()}</span>
                  <button class="btn-order" onclick="openOrderModal('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price})">Order Now</button>
                </div>
              </div>
            </div>
          `;
        });

        sectionHtml += `</div>`;
        section.innerHTML = sectionHtml;
        container.appendChild(section);
      });
    }

    /* ── SEARCH BAR REAL-TIME ROUTINE ── */
    function handleMenuSearch() {
      const query = document.getElementById('menuSearchInput').value.toLowerCase().trim();
      const clearBtn = document.getElementById('clearSearchBtn');
      
      if (query.length > 0) {
        clearBtn.style.display = 'block';
      } else {
        clearBtn.style.display = 'none';
        resetSearchFilters();
        return;
      }

      // 1. CATEGORY SCROLL TRIGGER (e.g., Typing "burger")
      const sections = document.querySelectorAll('.category-section');
      let categoryMatchFound = false;

      sections.forEach(section => {
        const targetCategoryAttr = section.getAttribute('data-category-name') || '';
        if (targetCategoryAttr.includes(query) && !categoryMatchFound) {
          section.scrollIntoView({ behavior: 'smooth', block: 'center' });
          categoryMatchFound = true; // Stop looking after the first matched category
        }
      });

      // 2. PRODUCT INDIVIDUAL ISOLATION AND HIGHLIGHTING (e.g., Typing "bbq tikka")
      const productCards = document.querySelectorAll('.product-card');
      let firstMatchedProductCard = null;

      productCards.forEach(card => {
        const textContentInsideCard = card.innerText.toLowerCase();
        
        if (textContentInsideCard.includes(query)) {
          card.style.display = ''; // Make sure card stays completely visible
          card.style.opacity = '1';
          
          if (!firstMatchedProductCard) {
            firstMatchedProductCard = card;
          }
        } else {
          // Dim elements that are not part of user focus constraints
          card.style.opacity = '0.15';
        }
      });

      // If we didn't find a category match, but found a specific item, scroll directly to it
      if (firstMatchedProductCard && !categoryMatchFound) {
        document.querySelectorAll('.product-card').forEach(c => c.classList.remove('search-highlight'));
        
        firstMatchedProductCard.classList.add('search-highlight');
        firstMatchedProductCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // Reset layout board structure
    function resetSearchFilters() {
      const productCards = document.querySelectorAll('.product-card');
      productCards.forEach(card => {
        card.style.display = '';
        card.style.opacity = '1';
        card.classList.remove('search-highlight');
      });
    }

    function clearMenuSearch() {
      document.getElementById('menuSearchInput').value = '';
      document.getElementById('clearSearchBtn').style.display = 'none';
      resetSearchFilters();
    }

    // Placeholder function for your existing order modal integration
    function openOrderModal(id, name, price) {
      alert("Order prompt for " + name + " (Rs " + price + ") will display your checkout forms.");
    }
  </script>
</body>
</html>
